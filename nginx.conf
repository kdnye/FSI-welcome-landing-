server {
    # Cloud Run injects $PORT=8080; the unprivileged nginx image expects 8080.
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # FSI standard health check.
    location = /healthz {
        default_type application/json;
        return 200 '{"status": "ok"}';
    }

    location = /css/fsi.css  { add_header Cache-Control "public, max-age=3600"; }
    location = /css/home.css { add_header Cache-Control "public, max-age=3600"; }

    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
